[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
amm_program = "6hUoxA8ETxkyuJWYBpyGcnho4VxBJGGuqeZ4wWYA7c3E"

[programs.localnet]
amm_program = "6hUoxA8ETxkyuJWYBpyGcnho4VxBJGGuqeZ4wWYA7c3E"

[registry]
